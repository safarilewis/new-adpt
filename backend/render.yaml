services:
  - type: web
    name: adpt-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adpt-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: adpt-redis
          property: connectionString
      - key: AUTH_TRUST_DEV_HEADERS
        value: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BACKEND_SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: adpt-postgres
    databaseName: adpt
    user: adpt

