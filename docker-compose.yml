services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: adpt
      POSTGRES_PASSWORD: adpt
      POSTGRES_DB: adpt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://adpt:adpt@postgres:5432/adpt
      REDIS_URL: redis://redis:6379/0
      BACKEND_SESSION_SECRET: dev-secret
      AUTH_TRUST_DEV_HEADERS: "false"
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:

